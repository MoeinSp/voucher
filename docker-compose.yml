services:
  bot:
    build: .
    container_name: voucher_bot
    restart: always
    env_file:
      - .env
    ports:
      - "${WEBHOOK_PORT:-8080}:${WEBHOOK_PORT:-8080}"
    volumes:
      - voucher_data:/app/data
      - ./data_offset:/app/data_offset
    deploy:
      resources:
        reservations:
          cpus: '0.1'
          memory: 128M
        limits:
          cpus: '0.5'
          memory: 512M

volumes:
  voucher_data:
    name: voucher_data
