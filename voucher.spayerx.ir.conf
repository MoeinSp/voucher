server {
    listen 80;
    server_name voucher.spayerx.ir;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name voucher.spayerx.ir;

    ssl_certificate     /etc/letsencrypt/live/voucher.spayerx.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/voucher.spayerx.ir/privkey.pem;

    location /webhook {
        proxy_pass http://127.0.0.1:8080/webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
